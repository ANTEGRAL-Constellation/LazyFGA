version: 2
updates:
  # JS/TS dependencies across the pnpm workspace (Dependabot reads pnpm-lock.yaml).
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 10
    groups:
      # Batch low-risk dev tooling bumps into a single PR to cut noise.
      dev-tooling:
        patterns:
          - "eslint*"
          - "typescript*"
          - "prettier"
          - "turbo"
          - "@types/*"

  # Keep the GitHub Actions used in workflows up to date.
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
