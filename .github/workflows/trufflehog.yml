name: Secret scan

on:
  push:
    branches: [main]
  pull_request:

jobs:
  trufflehog:
    name: TruffleHog
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0 # full history so PR diffs and first-push full scans resolve

      - name: TruffleHog secret scan
        uses: trufflesecurity/trufflehog@main
        with:
          # verified-only: confirmed live by the provider API. The repo intentionally
          # ships dev placeholder Postgres DSNs (docker-compose.yml, .env.example) that
          # are credential-shaped but not live; verified,unknown flagged those and failed
          # the job. Verified-only still fails on any real leaked secret, and GitHub
          # native secret scanning covers the pattern-based side.
          # Fully OSS action, no license key required (works on org and public repos).
          extra_args: --results=verified
