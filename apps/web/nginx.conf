# lazyFGA web(SPA) 서빙 + 같은 출처 /api 프록시.
# 정적 빌드에는 vite dev proxy가 없으므로 nginx가 /api/* 를 api 컨테이너(:8787)로 넘긴다.
# proxy_pass의 끝 슬래시가 location 접두사(/api/)를 /로 치환한다 → vite의
# rewrite: p.replace(/^\/api/, "") 와 동일(/api/policies → /policies).
server {
  listen 80;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  # 브라우저→nginx 요청 바디 상한(대형 모델 IR 발행 여유). api의 BodyLimit이 실질 게이트.
  client_max_body_size 5m;

  # 같은 출처 API 프록시(CORS 회피). /api 접두사를 떼고 api 서비스로 전달한다.
  location /api/ {
    proxy_pass http://lazyfga-api:8787/;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_read_timeout 60s;
  }

  # 정적 자산은 장기 캐시(해시 파일명), index.html은 캐시 안 함(배포 즉시 반영).
  location /assets/ {
    expires 1y;
    add_header Cache-Control "public, immutable";
    try_files $uri =404;
  }

  # SPA 폴백: 알려진 파일이 없으면 index.html로.
  location / {
    try_files $uri $uri/ /index.html;
  }
}
